version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: eway_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: eway_luxury_db
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: eway_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/eway_luxury_db
      JWT_SECRET: luxury_secret_key_eway_2026_super_secure
      JWT_REFRESH_SECRET: luxury_refresh_secret_key_eway_2026_super_secure
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: eway_client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: eway_admin
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - server

volumes:
  mongo_data:
